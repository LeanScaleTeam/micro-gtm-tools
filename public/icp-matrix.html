<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICP & Persona Matrix Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/lib/theme.css">
  <style>
    /* Tier colors */
    :root {
      --tier-1: #3fb950;
      --tier-1-bg: rgba(63, 185, 80, 0.15);
      --tier-2: #58a6ff;
      --tier-2-bg: rgba(88, 166, 255, 0.15);
      --tier-3: #d29922;
      --tier-3-bg: rgba(210, 153, 34, 0.15);
      --tier-off: #f85149;
      --tier-off-bg: rgba(248, 81, 73, 0.15);
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    /* Segment Bar */
    .segment-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--bg-card);
      border-radius: 10px;
      border: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .segment-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .segment-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .segment-tab {
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .segment-tab:hover {
      border-color: var(--accent-cyan);
      color: var(--text-primary);
    }

    .segment-tab.active {
      border-color: var(--accent-cyan);
      background: rgba(57, 197, 207, 0.15);
      color: var(--accent-cyan);
    }

    .segment-tab .remove-segment {
      background: none;
      border: none;
      color: var(--accent-red);
      cursor: pointer;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s;
      padding: 0 2px;
    }

    .segment-tab:hover .remove-segment { opacity: 0.7; }
    .segment-tab .remove-segment:hover { opacity: 1; }

    /* Matrix Tabs */
    .matrix-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .matrix-tab {
      padding: 12px 24px;
      background: var(--bg-secondary);
      border: 2px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .matrix-tab:hover {
      border-color: var(--accent-blue);
      color: var(--text-primary);
    }

    .matrix-tab.active {
      border-color: var(--accent-purple);
      background: rgba(163, 113, 247, 0.15);
      color: var(--accent-purple);
    }

    /* Matrix Table */
    .matrix-container {
      overflow-x: auto;
      background: var(--bg-card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 20px;
    }

    .matrix-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    .matrix-table th {
      background: var(--accent-purple);
      color: white;
      padding: 14px 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }

    .matrix-table th:first-child {
      background: var(--bg-secondary);
      color: var(--text-secondary);
      width: 120px;
    }

    .matrix-table th .remove-col {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(248, 81, 73, 0.8);
      border: none;
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .matrix-table th:hover .remove-col { opacity: 1; }

    .matrix-table td {
      padding: 12px;
      border: 1px solid var(--border);
      vertical-align: top;
      font-size: 13px;
      min-width: 140px;
    }

    .matrix-table td:first-child {
      font-weight: 600;
      text-align: center;
      width: 120px;
      min-width: 120px;
    }

    /* Tier styling */
    .tier-cell { position: relative; }
    .tier-cell .tier-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .tier-cell .tier-name { font-size: 14px; font-weight: 600; }
    .tier-cell .remove-tier {
      position: absolute; top: 4px; right: 4px;
      background: rgba(248, 81, 73, 0.8); border: none; color: white;
      width: 18px; height: 18px; border-radius: 50%; font-size: 10px;
      cursor: pointer; opacity: 0; transition: opacity 0.2s;
    }
    .tier-cell:hover .remove-tier { opacity: 1; }

    .tier-1 td:first-child { background: var(--tier-1-bg); border-left: 4px solid var(--tier-1); }
    .tier-2 td:first-child { background: var(--tier-2-bg); border-left: 4px solid var(--tier-2); }
    .tier-3 td:first-child { background: var(--tier-3-bg); border-left: 4px solid var(--tier-3); }
    .tier-off td:first-child { background: var(--tier-off-bg); border-left: 4px solid var(--tier-off); }

    /* Editable cells */
    .cell-content {
      min-height: 60px; padding: 8px; background: var(--bg-secondary);
      border-radius: 6px; cursor: pointer; transition: all 0.2s; line-height: 1.5;
    }
    .cell-content:hover { background: var(--bg-input); }
    .cell-content:empty::before { content: 'Click to edit...'; color: var(--text-secondary); font-style: italic; }
    .cell-content.editing { background: var(--bg-input); outline: 2px solid var(--accent-blue); }

    /* Weight row */
    .weight-row td { background: var(--bg-secondary); }
    .weight-row td:first-child { font-weight: 600; color: var(--text-secondary); }
    .weight-input {
      width: 60px; padding: 8px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text-primary); font-size: 16px; font-weight: 600; text-align: center;
    }
    .weight-input:focus { outline: none; border-color: var(--accent-blue); }

    .color-options { display: flex; gap: 10px; margin-top: 8px; }
    .color-option {
      width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
      border: 2px solid transparent; transition: all 0.2s;
    }
    .color-option:hover, .color-option.selected { border-color: white; transform: scale(1.1); }
    .color-option.green { background: var(--tier-1); }
    .color-option.blue { background: var(--tier-2); }
    .color-option.yellow { background: var(--tier-3); }
    .color-option.red { background: var(--tier-off); }
    .color-option.purple { background: var(--accent-purple); }
    .color-option.orange { background: var(--accent-orange); }

    /* Summary Stats */
    .summary-bar {
      display: flex; gap: 20px; margin-bottom: 20px; padding: 16px 20px;
      background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border);
    }
    .summary-stat { text-align: center; }
    .summary-stat-value { font-size: 24px; font-weight: 700; }
    .summary-stat-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; }

    /* Print */
    @media print {
      .controls, .remove-col, .remove-tier { display: none !important; }
      .matrix-container { background: white; border: 1px solid #ddd; }
      .matrix-table th { background: #6b5b95 !important; }
      .matrix-table td { border: 1px solid #ddd; }
      .cell-content { background: #f5f5f5; }
      .summary-bar { background: #f5f5f5; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
  <a href="#app-container" class="skip-link">Skip to main content</a>
  <!-- Login Gate -->
  <div id="login-container">
    <div class="login-box">
      <h2>ICP Matrix</h2>
      <p class="login-subtitle">Sign in to continue</p>
      <form id="login-form">
        <input id="login-email" type="email" placeholder="Email" required aria-label="Email address">
        <input id="login-password" type="password" placeholder="Password" required aria-label="Password">
        <button type="submit" class="login-submit">Sign In</button>
        <button type="button" id="magic-link-btn" class="login-magic">Send Magic Link</button>
        <p id="login-error"></p>
      </form>
    </div>
  </div>

  <div id="app-container" style="display:none;">
  <div class="header">
    <h1>🎯 ICP & Persona Matrix</h1>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="resetToDefaults()">↺ Reset Defaults</button>
      <button class="btn btn-outline" onclick="exportJSON()">📥 Export JSON</button>
      <button class="btn btn-outline" onclick="exportPDF()">📄 Export PDF</button>
    </div>
  </div>

  <!-- Segment Selector -->
  <div class="segment-bar">
    <div class="segment-label">📁 Segment:</div>
    <div class="segment-tabs" id="segment-tabs"></div>
    <button class="btn btn-sm btn-green" onclick="openAddSegmentModal()">+ Add Segment</button>
  </div>

  <!-- Matrix Type Tabs -->
  <div class="matrix-tabs">
    <button class="matrix-tab active" data-matrix="icp" onclick="switchMatrix('icp')">🏢 ICP Matrix</button>
    <button class="matrix-tab" data-matrix="persona" onclick="switchMatrix('persona')">👤 Persona Matrix</button>
  </div>

  <div class="summary-bar">
    <div class="summary-stat"><div class="summary-stat-value" id="stat-tiers">4</div><div class="summary-stat-label">Tiers</div></div>
    <div class="summary-stat"><div class="summary-stat-value" id="stat-dimensions">7</div><div class="summary-stat-label">Dimensions</div></div>
    <div class="summary-stat"><div class="summary-stat-value" id="stat-total-weight">51</div><div class="summary-stat-label">Total Weight</div></div>
  </div>

  <div class="controls">
    <button class="btn btn-green" onclick="openAddTierModal()">+ Add Tier</button>
    <button class="btn btn-purple" onclick="openAddDimensionModal()">+ Add Dimension</button>
  </div>

  <div class="matrix-container">
    <table class="matrix-table" id="matrix-table"></table>
  </div>

  <!-- Add Tier Modal -->
  <div class="modal-overlay" id="tier-modal">
    <div class="modal">
      <div class="modal-title">Add Tier</div>
      <div class="input-group">
        <label class="input-label">Tier Name</label>
        <input type="text" class="input-field" id="tier-name" placeholder="e.g., Great Fit, Good Fit">
      </div>
      <div class="input-group">
        <label class="input-label">Label</label>
        <input type="text" class="input-field" id="tier-label" placeholder="e.g., Tier 1, Tier 2">
      </div>
      <div class="input-group">
        <label class="input-label">Color</label>
        <div class="color-options">
          <div class="color-option green selected" data-color="1" onclick="selectColor(this)"></div>
          <div class="color-option blue" data-color="2" onclick="selectColor(this)"></div>
          <div class="color-option yellow" data-color="3" onclick="selectColor(this)"></div>
          <div class="color-option red" data-color="off" onclick="selectColor(this)"></div>
          <div class="color-option purple" data-color="purple" onclick="selectColor(this)"></div>
          <div class="color-option orange" data-color="orange" onclick="selectColor(this)"></div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('tier-modal')">Cancel</button>
        <button class="btn btn-green" onclick="addTier()">Add Tier</button>
      </div>
    </div>
  </div>

  <!-- Add Dimension Modal -->
  <div class="modal-overlay" id="dimension-modal">
    <div class="modal">
      <div class="modal-title">Add Dimension</div>
      <div class="input-group">
        <label class="input-label">Dimension Name</label>
        <input type="text" class="input-field" id="dimension-name" placeholder="e.g., Industry, Company Size">
      </div>
      <div class="input-group">
        <label class="input-label">Weight (1-10)</label>
        <input type="number" class="input-field" id="dimension-weight" value="5" min="1" max="10">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('dimension-modal')">Cancel</button>
        <button class="btn btn-purple" onclick="addDimension()">Add Dimension</button>
      </div>
    </div>
  </div>

  <!-- Add Segment Modal -->
  <div class="modal-overlay" id="segment-modal">
    <div class="modal">
      <div class="modal-title">Add Segment</div>
      <div class="input-group">
        <label class="input-label">Segment Name</label>
        <input type="text" class="input-field" id="segment-name" placeholder="e.g., Enterprise, SMB, Product A">
      </div>
      <div class="input-group">
        <label class="input-label">Copy from</label>
        <select class="input-field" id="segment-copy-from"><option value="">Start empty</option></select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('segment-modal')">Cancel</button>
        <button class="btn btn-green" onclick="addSegment()">Add Segment</button>
      </div>
    </div>
  </div>

  <!-- Edit Cell Modal -->
  <div class="modal-overlay" id="cell-modal">
    <div class="modal">
      <div class="modal-title" id="cell-modal-title">Edit Cell</div>
      <div class="input-group">
        <label class="input-label">Criteria</label>
        <textarea class="input-field" id="cell-content" placeholder="Enter criteria for this cell..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('cell-modal')">Cancel</button>
        <button class="btn btn-green" onclick="saveCell()">Save</button>
      </div>
    </div>
  </div>
  </div><!-- end app-container -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/lib/env.js"></script>
  <script src="/lib/auth-client.js"></script>
  <script src="/lib/nav.js"></script>

  <script>
    // Default tiers (shared across all segments)
    const DEFAULT_TIERS = [
      { id: 't1', label: 'Tier 1', name: 'Great Fit', color: '1' },
      { id: 't2', label: 'Tier 2', name: 'Good Fit', color: '2' },
      { id: 't3', label: 'Tier 3', name: 'Potential Fit', color: '3' },
      { id: 'toff', label: 'Off Limits', name: 'No Fit', color: 'off' }
    ];

    const DEFAULT_ICP = {
      dimensions: [
        { id: 'd1', name: 'Geographic', weight: 8 },
        { id: 'd2', name: 'Funding', weight: 5 },
        { id: 'd3', name: 'Firmographic', weight: 10 },
        { id: 'd4', name: 'Technographic', weight: 10 },
        { id: 'd5', name: 'Problem / Pain', weight: 8 },
        { id: 'd6', name: 'Executive Sponsor', weight: 5 },
        { id: 'd7', name: 'Champion', weight: 5 }
      ],
      cells: {
        't1_d1': 'United States', 't1_d2': 'Series A, B, or equivalent maturity', 't1_d3': 'B2B, SaaS, AIaaS',
        't1_d4': 'Salesforce, HubSpot', 't1_d5': 'Full Stack RevOps', 't1_d6': 'Investors (VC or PE)', 't1_d7': 'CEO, CFO, CRO',
        't2_d1': 'Canada', 't2_d2': 'Series C, D or equivalent maturity', 't2_d3': 'B2B Services',
        't2_d4': '-', 't2_d5': 'Sales Ops, Marketing Ops, CS Ops', 't2_d6': 'CEO, CFO, CRO', 't2_d7': 'GTM Leadership',
        't3_d1': 'UK', 't3_d2': 'Seed', 't3_d3': 'B2B Marketplaces',
        't3_d4': '-', 't3_d5': 'Systems Admin', 't3_d6': 'Head of RevOps', 't3_d7': 'RevOps Leadership',
        'toff_d1': 'Rest of World', 'toff_d2': 'Public Companies or lifestyle business', 'toff_d3': 'B2C, Non-Tech',
        'toff_d4': 'Not using GTM tech stack', 'toff_d5': 'One off Projects', 'toff_d6': 'Manager level or below', 'toff_d7': 'ICs Only'
      }
    };

    const DEFAULT_PERSONA = {
      dimensions: [
        { id: 'p1', name: 'Title', weight: 8 },
        { id: 'p2', name: 'Experience', weight: 5 },
        { id: 'p3', name: 'KPIs', weight: 10 },
        { id: 'p4', name: 'Pain', weight: 10 },
        { id: 'p5', name: 'Buying Motivation', weight: 8 },
        { id: 'p6', name: 'Cultural Attributes', weight: 5 }
      ],
      cells: {
        't1_p1': 'CRO', 't1_p2': 'Seasoned, been in role for 3 or more times before', 't1_p3': 'Full ARR ownership',
        't1_p4': 'Holistic GTM ops pain, reporting/systems/process', 't1_p5': 'Have ops in order for strategic event (fundraise/exit)',
        't1_p6': 'Practical and pragmatic, decisive, strategic, fast paced',
        't2_p1': 'Head of RevOps, CMO, VP of Sales, VP of CS, COO', 't2_p2': 'Experienced, been in the role at least once before',
        't2_p3': 'Functional KPIs, bookings/pipeline/churn', 't2_p4': 'Specific pain, systems/reporting/process',
        't2_p5': 'Hit company wide KPIs / OKRs', 't2_p6': 'Innovative, experimental',
        't3_p1': 'Founder/CEO/CFO', 't3_p2': 'Newbies, first time in role', 't3_p3': 'Financial metrics',
        't3_p4': 'Systems only or point projects', 't3_p5': 'Hit departmental KPIs / Job security / promotion', 't3_p6': 'Slow paced, indecisive',
        'toff_p1': 'CTO, Head of Engineering', 'toff_p2': 'n/a', 'toff_p3': 'Product only KPIs',
        'toff_p4': 'n/a', 'toff_p5': 'n/a', 'toff_p6': 'Aggressive, combative'
      }
    };

    function createDefaultSegment(name = 'General') {
      return {
        id: 'seg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
        name: name,
        icp: JSON.parse(JSON.stringify(DEFAULT_ICP)),
        persona: JSON.parse(JSON.stringify(DEFAULT_PERSONA))
      };
    }

    const DEFAULT_DATA = {
      tiers: JSON.parse(JSON.stringify(DEFAULT_TIERS)),
      segments: [
        { id: 'seg_general', name: 'General', icp: JSON.parse(JSON.stringify(DEFAULT_ICP)), persona: JSON.parse(JSON.stringify(DEFAULT_PERSONA)) }
      ],
      currentSegmentId: 'seg_general'
    };

    let data = JSON.parse(JSON.stringify(DEFAULT_DATA));
    let currentMatrix = 'icp';
    let editingCell = null;
    let selectedTierColor = '1';

    function getCurrentSegment() { return data.segments.find(s => s.id === data.currentSegmentId) || data.segments[0]; }
    function getMatrixData() { return getCurrentSegment()[currentMatrix]; }

    function renderSegmentTabs() {
      const container = document.getElementById('segment-tabs');
      container.innerHTML = data.segments.map(seg => `
        <div class="segment-tab ${seg.id === data.currentSegmentId ? 'active' : ''}" onclick="switchSegment('${seg.id}')">
          ${seg.name}
          ${data.segments.length > 1 ? `<button class="remove-segment" onclick="event.stopPropagation(); removeSegment('${seg.id}')" title="Remove">\u00d7</button>` : ''}
        </div>
      `).join('');
    }

    function switchSegment(segId) { data.currentSegmentId = segId; renderSegmentTabs(); renderMatrix(); saveToStorage(); }

    function openAddSegmentModal() {
      document.getElementById('segment-name').value = '';
      const select = document.getElementById('segment-copy-from');
      select.innerHTML = '<option value="">Start empty</option>' + data.segments.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      document.getElementById('segment-modal').classList.add('active');
      document.getElementById('segment-name').focus();
    }

    function addSegment() {
      const name = document.getElementById('segment-name').value.trim() || 'New Segment';
      const copyFromId = document.getElementById('segment-copy-from').value;
      let newSegment;
      if (copyFromId) {
        const source = data.segments.find(s => s.id === copyFromId);
        newSegment = JSON.parse(JSON.stringify(source));
        newSegment.id = 'seg_' + Date.now();
        newSegment.name = name;
      } else {
        newSegment = { id: 'seg_' + Date.now(), name, icp: { dimensions: JSON.parse(JSON.stringify(DEFAULT_ICP.dimensions)), cells: {} }, persona: { dimensions: JSON.parse(JSON.stringify(DEFAULT_PERSONA.dimensions)), cells: {} } };
      }
      data.segments.push(newSegment);
      data.currentSegmentId = newSegment.id;
      closeModal('segment-modal'); renderSegmentTabs(); renderMatrix(); saveToStorage();
    }

    function removeSegment(segId) {
      if (data.segments.length <= 1) { alert('You must have at least one segment'); return; }
      if (!confirm('Remove this segment and all its data?')) return;
      data.segments = data.segments.filter(s => s.id !== segId);
      if (data.currentSegmentId === segId) data.currentSegmentId = data.segments[0].id;
      renderSegmentTabs(); renderMatrix(); saveToStorage();
    }

    function getCellKey(tierId, dimId) { return `${tierId}_${dimId}`; }
    function getTierClass(color) { if (color === '1') return 'tier-1'; if (color === '2') return 'tier-2'; if (color === '3') return 'tier-3'; if (color === 'off') return 'tier-off'; return 'tier-1'; }

    function switchMatrix(matrix) {
      currentMatrix = matrix;
      document.querySelectorAll('.matrix-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.matrix === matrix));
      renderMatrix();
    }

    function renderMatrix() {
      const table = document.getElementById('matrix-table');
      const matrixData = getMatrixData();
      let html = '<thead><tr><th></th>';
      matrixData.dimensions.forEach(dim => { html += `<th>${dim.name}<button class="remove-col" onclick="removeDimension('${dim.id}')" title="Remove">\u00d7</button></th>`; });
      html += '</tr></thead><tbody>';
      data.tiers.forEach(tier => {
        html += `<tr class="${getTierClass(tier.color)}"><td class="tier-cell"><div class="tier-label">${tier.label}</div><div class="tier-name">${tier.name}</div><button class="remove-tier" onclick="removeTier('${tier.id}')" title="Remove">\u00d7</button></td>`;
        matrixData.dimensions.forEach(dim => {
          const key = getCellKey(tier.id, dim.id);
          html += `<td><div class="cell-content" onclick="editCell('${tier.id}', '${dim.id}')">${matrixData.cells[key] || ''}</div></td>`;
        });
        html += '</tr>';
      });
      html += '<tr class="weight-row"><td>Weight<br>(1-10)</td>';
      matrixData.dimensions.forEach(dim => { html += `<td style="text-align:center;"><input type="number" class="weight-input" value="${dim.weight}" min="1" max="10" onchange="updateWeight('${dim.id}', this.value)"></td>`; });
      html += '</tr></tbody>';
      table.innerHTML = html;
      updateStats();
    }

    function updateStats() {
      const matrixData = getMatrixData();
      document.getElementById('stat-tiers').textContent = data.tiers.length;
      document.getElementById('stat-dimensions').textContent = matrixData.dimensions.length;
      document.getElementById('stat-total-weight').textContent = matrixData.dimensions.reduce((sum, d) => sum + d.weight, 0);
    }

    function editCell(tierId, dimId) {
      editingCell = { tierId, dimId };
      const matrixData = getMatrixData();
      const key = getCellKey(tierId, dimId);
      const tier = data.tiers.find(t => t.id === tierId);
      const dim = matrixData.dimensions.find(d => d.id === dimId);
      document.getElementById('cell-modal-title').textContent = `${tier.name} - ${dim.name}`;
      document.getElementById('cell-content').value = matrixData.cells[key] || '';
      document.getElementById('cell-modal').classList.add('active');
      document.getElementById('cell-content').focus();
    }

    function saveCell() {
      if (!editingCell) return;
      const matrixData = getMatrixData();
      matrixData.cells[getCellKey(editingCell.tierId, editingCell.dimId)] = document.getElementById('cell-content').value;
      closeModal('cell-modal'); renderMatrix(); saveToStorage();
    }

    function updateWeight(dimId, value) {
      const dim = getMatrixData().dimensions.find(d => d.id === dimId);
      if (dim) { dim.weight = parseInt(value) || 1; updateStats(); saveToStorage(); }
    }

    function selectColor(el) {
      document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
      el.classList.add('selected'); selectedTierColor = el.dataset.color;
    }

    function openAddTierModal() {
      document.getElementById('tier-name').value = '';
      document.getElementById('tier-label').value = 'Tier ' + (data.tiers.length + 1);
      selectedTierColor = '1';
      document.querySelectorAll('.color-option').forEach(opt => opt.classList.toggle('selected', opt.dataset.color === '1'));
      document.getElementById('tier-modal').classList.add('active');
    }

    function addTier() {
      data.tiers.push({ id: 't_' + Date.now(), label: document.getElementById('tier-label').value.trim() || 'Tier ' + (data.tiers.length + 1), name: document.getElementById('tier-name').value.trim() || 'New Tier', color: selectedTierColor });
      closeModal('tier-modal'); renderMatrix(); saveToStorage();
    }

    function removeTier(id) {
      if (data.tiers.length <= 1) { alert('You must have at least one tier'); return; }
      if (!confirm('Remove this tier from all segments?')) return;
      data.tiers = data.tiers.filter(t => t.id !== id);
      data.segments.forEach(seg => {
        Object.keys(seg.icp.cells).forEach(key => { if (key.startsWith(id + '_')) delete seg.icp.cells[key]; });
        Object.keys(seg.persona.cells).forEach(key => { if (key.startsWith(id + '_')) delete seg.persona.cells[key]; });
      });
      renderMatrix(); saveToStorage();
    }

    function openAddDimensionModal() {
      document.getElementById('dimension-name').value = '';
      document.getElementById('dimension-weight').value = '5';
      document.getElementById('dimension-modal').classList.add('active');
    }

    function addDimension() {
      const matrixData = getMatrixData();
      const prefix = currentMatrix === 'icp' ? 'd' : 'p';
      matrixData.dimensions.push({ id: prefix + '_' + Date.now(), name: document.getElementById('dimension-name').value.trim() || 'New Dimension', weight: Math.min(10, Math.max(1, parseInt(document.getElementById('dimension-weight').value) || 5)) });
      closeModal('dimension-modal'); renderMatrix(); saveToStorage();
    }

    function removeDimension(id) {
      const matrixData = getMatrixData();
      if (matrixData.dimensions.length <= 1) { alert('You must have at least one dimension'); return; }
      if (!confirm('Remove this dimension?')) return;
      matrixData.dimensions = matrixData.dimensions.filter(d => d.id !== id);
      Object.keys(matrixData.cells).forEach(key => { if (key.endsWith('_' + id)) delete matrixData.cells[key]; });
      renderMatrix(); saveToStorage();
    }

    function closeModal(id) { document.getElementById(id).classList.remove('active'); editingCell = null; }

    function resetToDefaults() {
      if (!confirm('Reset to defaults? This will replace ALL segments with a single General segment.')) return;
      data = JSON.parse(JSON.stringify(DEFAULT_DATA));
      renderSegmentTabs(); renderMatrix(); saveToStorage();
    }

    // Storage
    function saveToStorage() {
      AuthUI.apiFetch('/api/tools/icp-matrix/state', { method: 'PUT', body: JSON.stringify(data) });
    }

    function getDefaults() { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }

    async function loadData() {
      try {
        const resp = await AuthUI.apiFetch('/api/tools/icp-matrix/state');
        const saved = await resp.json();
        if (saved && Object.keys(saved).length > 0) {
          if (saved.icp && !saved.segments) {
            const migrated = getDefaults();
            migrated.tiers = saved.tiers || DEFAULT_TIERS;
            migrated.segments[0].icp = saved.icp;
            migrated.segments[0].persona = saved.persona;
            return migrated;
          } else if (saved.segments) { return saved; }
        }
        return getDefaults();
      } catch (e) { return getDefaults(); }
    }

    function exportJSON() {
      const exportData = { name: 'ICP & Persona Matrix', exportedAt: new Date().toISOString(), tiers: data.tiers, segments: data.segments.map(seg => ({ name: seg.name, icpMatrix: seg.icp, personaMatrix: seg.persona })) };
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'icp-persona-matrix.json'; a.click();
      URL.revokeObjectURL(url);
    }

    function exportPDF() { window.print(); }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); editingCell = null; }
      if (e.key === 'Enter' && e.ctrlKey && editingCell) saveCell();
    });

    async function initApp() { data = await loadData(); renderSegmentTabs(); renderMatrix(); }

    AuthUI.onLogin(() => { initApp(); });
    AuthUI.init();
  </script>
</body>
</html>
